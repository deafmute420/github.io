<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: black; }
    iframe { width: 100%; height: 100%; border: 0; }
    .overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: black; color: white; text-align: center; 
      display: flex; justify-content: center; align-items: center; 
      font-size: 2em; cursor: pointer; z-index: 999; 
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">Tap to Enter</div>
  <iframe 
    id="player" 
    src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1&autoplay=1&mute=1" 
    allow="autoplay; fullscreen; encrypted-media" 
    style="display:none">
  </iframe>

  <script>
    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        events: {
          'onReady': function() {
            document.getElementById('player').style.display = 'block';
          }
        }
      });
    }

    document.getElementById('overlay').onclick = function() {
      this.innerHTML = 'Rickrolled!';
      this.style.zIndex = -1;
      player.unMute();
      player.playVideo();
    };

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
  </script>
</body>
</html>
